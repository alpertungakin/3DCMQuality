<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDF and SHACL Document Validator</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
    }
    h1 {
        margin-bottom: 20px;
    }
    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .document-section {
        margin-bottom: 20px;
        width: 100vmax;
        display: flex; /* Yanyana düzenlemek için flex kullan */
        justify-content: space-between; /* Elemanları eşit aralıklarla yerleştir */
    }
    .document-section label {
        font-weight: bold;
    }
    .file-input {
        width: 48%; /* Yarısı genişlikte */
    }
    .file-input input[type="file"] {
        width: 100%;
        margin-bottom: 10px; /* Boşluk eklemek için */
    }
    textarea {
        width: 48%; /* Yarısı genişlikte */
        height: 500px; /* Metin görüntüleyicinin yüksekliği */
        overflow-x: auto; /* Yatay kaydırma çubuğunu göster */
        white-space: nowrap; /* Metni bir satırda tut */
    }
    .submit-button {
        margin-top: 20px;
        padding: 10px 20px;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
    }
    .result-section {
        margin-top: 10px;
        width: 100vmax;
    }
    .result-section pre {
        white-space: pre-wrap;
    }
</style>
</head>
<body>
<div class="container">
    <h1>RDF and SHACL Document Validator</h1>
    <form id="upload-form" enctype="multipart/form-data">
        <div class="document-section">
            <div class="file-input">
                <label for="rdf">Upload RDF Document:</label><br>
                <input type="file" name="rdf" id="rdf" onchange="showFileContent('rdf', 'rdf-text')"><br>
            </div>
            <div class="file-input">
                <label for="shacl">Upload SHACL Document:</label><br>
                <input type="file" name="shacl" id="shacl" onchange="showFileContent('shacl', 'shacl-text')"><br>
            </div>
        </div>
        <div class="document-section">
            <textarea id="rdf-text" rows="10"></textarea>
            <textarea id="shacl-text" rows="10"></textarea>
        </div>
        <button type="button" onclick="processDocuments()" class="submit-button">Process Documents</button>
    </form>
    <div class="result-section" id="result-section" style="display:none;">
        <h2>Validation Result:</h2>
        <pre id="validation-result"></pre>
    </div>
</div>

<script>
    function showFileContent(fileInputId, textareaId) {
        var fileInput = document.getElementById(fileInputId);
        var file = fileInput.files[0];
        var reader = new FileReader();
        reader.onload = function(event) {
            var contents = event.target.result;
            var textarea = document.getElementById(textareaId);
            textarea.value = contents;
        };
        reader.readAsText(file);
    }

    function processDocuments() {
        var rdfText = document.getElementById('rdf-text').value;
        var shaclText = document.getElementById('shacl-text').value;

        // Gönderilecek verileri kontrol etmek için
        console.log("RDF Text:", rdfText);
        console.log("SHACL Text:", shaclText);

        // Burada sunucuya dosyaları ve metin içeriğini gönderme işlemi gerçekleştirilebilir

        // Simüle edilmiş sonuç
        var result = "RDF document is valid according to SHACL constraints.";

        document.getElementById('validation-result').innerText = result;
        document.getElementById('result-section').style.display = 'block';
    }
</script>
</body>
</html>
